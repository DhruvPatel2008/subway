<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#090909; --surface:#111111; --surface2:#161616; --border:#1f1f1f;
    --text:#efefef; --muted:#4a4a4a;
    --green:#00d46a; --yellow:#ffd60a; --orange:#ff9500; --red:#ff2d55;
    --green-bg:#001f0f; --yellow-bg:#1f1a00; --orange-bg:#1f0e00; --red-bg:#200010;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;}
  body{overflow-x:hidden;}
  ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:#0a0a0a;} ::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

  /* HEADER */
  #header{position:sticky;top:0;z-index:100;background:rgba(9,9,9,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 18px;}
  #header-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
  #logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--green);line-height:1;}
  #logo span{font-size:11px;display:block;letter-spacing:2px;color:var(--muted);font-family:'DM Mono',monospace;font-weight:300;}
  #badges{display:flex;gap:6px;align-items:center;}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
  .badge-red{background:var(--red-bg);color:var(--red);animation:pulse 2s infinite;}
  .badge-orange{background:var(--orange-bg);color:var(--orange);}
  #sync-row{max-width:680px;margin:8px auto 0;display:flex;align-items:center;gap:6px;padding:0 18px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background 0.3s;}
  .sync-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green);}
  .sync-dot.error{background:var(--red);}
  #sync-text{font-size:10px;color:var(--muted);letter-spacing:1px;}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes rowIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

  /* MAIN */
  #main{max-width:680px;margin:0 auto;padding:16px 16px 100px;}

  /* TABS */
  #tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab-btn{padding:8px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all 0.15s;}
  .tab-btn.active{background:var(--green);color:#000;border-color:var(--green);font-weight:500;}
  .tab-btn:hover:not(.active){border-color:#333;color:var(--text);}

  /* SEARCH */
  #search-wrap{position:relative;margin-bottom:12px;}
  #search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px 10px 36px;font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border 0.15s;}
  #search-wrap input:focus{border-color:#333;}
  #search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}

  /* CAT FILTERS */
  #cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .cat-btn{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all 0.12s;white-space:nowrap;}
  .cat-btn:hover{color:var(--text);}
  .cat-btn.active{color:#fff;border-color:transparent;}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}

  /* DASHBOARD ROWS */
  .log-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);transition:background 0.1s;animation:rowIn 0.2s ease;}
  .log-row:last-child{border-bottom:none;}
  .log-row:hover{background:var(--surface2);}
  .row-icon{font-size:18px;flex-shrink:0;}
  .row-info{flex:1;min-width:0;}
  .row-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .row-status{text-align:right;flex-shrink:0;}
  .status-chip{padding:4px 9px;border-radius:7px;font-size:11px;font-weight:500;white-space:nowrap;display:inline-block;}
  .row-exp{font-size:9px;color:var(--muted);margin-top:3px;}
  .del-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s;}
  .del-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red);}

  /* EMPTY */
  .empty{padding:48px 20px;text-align:center;color:var(--muted);}
  .empty-icon{font-size:48px;margin-bottom:12px;}
  .empty-text{font-size:13px;line-height:1.8;}
  .empty-btn{margin-top:18px;padding:10px 24px;background:var(--green);color:#000;border:none;border-radius:10px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;}

  /* CATALOG */
  .cat-group{margin-bottom:16px;}
  .cat-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-left:2px;}
  .cat-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;}
  .add-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;}
  .add-row:last-child{border-bottom:none;}
  .add-row:hover{background:var(--surface2);}
  .add-row-name{flex:1;font-size:13px;}
  .add-row-states{font-size:10px;color:var(--muted);text-align:right;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .add-arrow{color:var(--muted);font-size:18px;flex-shrink:0;}

  /* MODAL */
  #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-end;justify-content:center;}
  #modal-overlay.open{display:flex;}
  #modal{background:#111;border:1px solid #222;border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:80vh;overflow-y:auto;padding:24px;animation:slideUp 0.25s ease;}
  #modal-icon{font-size:32px;margin-bottom:8px;}
  #modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px;}
  #modal-sub{font-size:11px;color:var(--muted);margin-bottom:20px;}
  .state-btn{width:100%;display:flex;justify-content:space-between;align-items:center;padding:15px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;font-family:'DM Mono',monospace;color:var(--text);font-size:13px;cursor:pointer;transition:all 0.15s;margin-bottom:8px;}
  .state-btn:hover{background:var(--surface2);border-color:#333;transform:translateY(-1px);}
  .state-btn-hours{font-size:12px;}
  #modal-cancel{width:100%;padding:13px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:12px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;margin-top:6px;transition:all 0.15s;}
  #modal-cancel:hover{color:var(--text);border-color:#333;}

  /* ERROR BANNER */
  #firebase-banner{display:none;background:#1a0500;border:1px solid #6b2500;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:12px;color:#ff8c42;line-height:1.7;}
  #firebase-banner.show{display:block;}
  #firebase-banner strong{color:#ff5700;display:block;margin-bottom:4px;}
  code{background:#0a0a0a;padding:1px 5px;border-radius:3px;font-family:'DM Mono',monospace;}
</style>

// ============================================================
// STATE
// ============================================================
let logs        = {};
let db          = null;
let currentTab  = 'dashboard';
let searchQ     = '';
let filterCat   = 'All';
let pendingCat  = null;
let pendingItem = null;
let fbReady     = false; // true once Firebase has given us its first snapshot

// ============================================================
// HELPERS
// ============================================================
function showBanner(msg) {
  const el = document.getElementById('firebase-banner');
  el.innerHTML = '<strong>⚠ Firebase problem</strong> ' + msg;
  el.classList.add('show');
}
function hideBanner() {
  document.getElementById('firebase-banner').classList.remove('show');
}
function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sync-text').textContent = text;
}
function loadLocal() {
  try { return JSON.parse(localStorage.getItem('sw_logs_v2') || '{}'); } catch { return {}; }
}
function saveLocal(data) {
  try { localStorage.setItem('sw_logs_v2', JSON.stringify(data)); } catch {}
}

// ============================================================
// FIREBASE INIT
// ============================================================
function initFirebase() {
  if (FIREBASE_CONFIG.apiKey.includes('PASTE_YOUR')) {
    showBanner('Config not filled in. Open index.html in Notepad and paste your Firebase values.');
    setSyncStatus('error', 'NOT CONFIGURED');
    logs = loadLocal(); render(); return;
  }
  if (!FIREBASE_CONFIG.databaseURL || !FIREBASE_CONFIG.databaseURL.includes('firebaseio')) {
    showBanner('<code>databaseURL</code> is missing or wrong. Copy it from Firebase Console → Realtime Database. It looks like <code>https://your-project-default-rtdb.firebaseio.com</code>');
    setSyncStatus('error', 'BAD databaseURL');
    logs = loadLocal(); render(); return;
  }

  // Show local data immediately while Firebase loads — no blank screen
  logs = loadLocal();
  render();
  setSyncStatus('', 'CONNECTING...');

  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();


    // ── Real-time listener ────────────────────────────────────
    // Fires on page load AND whenever ANY device adds/removes something
    db.ref('logs').on('value', snap => {
      const fbData  = snap.val() || {};
      const local   = loadLocal();

      // MERGE: combine Firebase data + any local-only items
      // Local items that haven't reached Firebase yet are preserved
      const merged  = Object.assign({}, fbData, local);

      // Push any local-only items up to Firebase so they sync
      Object.keys(local).forEach(id => {
        if (!fbData[id]) {
          db.ref('logs/' + id).set(local[id]).catch(() => {});
        }
      });

      // Firebase is now the master copy
      logs = fbData; // after upload, Firebase will fire again with merged data
      if (!fbReady) {
        // First load: use merged so nothing disappears
        logs = merged;
        fbReady = true;
      }
      saveLocal(logs);
      render();
    }, err => {
      console.error(err);
      const msg = err.code === 'PERMISSION_DENIED'
        ? 'Permission denied. Go to Firebase Console → Realtime Database → Rules → set <code>"read": true, "write": true</code> and click Publish.'
        : 'Sync error: ' + err.message;
      showBanner(msg);
      setSyncStatus('error', 'SYNC ERROR');
    });

    // ── Connection indicator ──────────────────────────────────
    db.ref('.info/connected').on('value', snap => {
      if (snap.val() === true) {
        hideBanner();
        setSyncStatus('connected', 'SYNCED — LIVE ✓');
      } else {
        setSyncStatus('', 'OFFLINE — changes save when reconnected');
      }
    });

  } catch (err) {
    showBanner('Config error: ' + err.message);
    setSyncStatus('error', 'ERROR');
  }
}

// ============================================================
// ADD / DELETE  — always write to Firebase immediately
// (Firebase SDK queues the write if offline and sends it when back online)
// ============================================================
function addLog(cat, item, state) {
  const id    = 'log_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
  const entry = { id, cat, name: item.n, state: state.l, hours: state.h, loggedAt: Date.now() };

  // 1. Update screen instantly
  logs[id] = entry;
  saveLocal(logs);
  render();

  // 2. Write to Firebase unconditionally — SDK queues if offline
  if (db) {
    db.ref('logs/' + id).set(entry).catch(err => console.error('Write error:', err));
  }

  closeModal();
  switchTab('dashboard');
}

function deleteLog(id) {
  // 1. Remove from screen instantly
  delete logs[id];
  saveLocal(logs);
  render();

  // 2. Remove from Firebase unconditionally
  if (db) {
    db.ref('logs/' + id).remove().catch(err => console.error('Delete error:', err));
  }
}

// ============================================================
// STATUS HELPERS
// ============================================================
function getStatus(loggedAt, hours) {
  const now      = Date.now();
  const expiresAt = loggedAt + hours * 3600000;
  const rem      = expiresAt - now;
  const remH     = rem / 3600000;

  if (rem <= 0)    return { label:'⚠ DISCARD NOW',                                                color:'var(--red)',    bg:'var(--red-bg)',    urgency:3 };
  if (remH <= 2)   return { label: remH < 1 ? `${Math.ceil(remH*60)}m left` : `${remH.toFixed(1)}h left`, color:'var(--orange)', bg:'var(--orange-bg)', urgency:2 };
  if (remH <= 6)   return { label: `${remH.toFixed(1)}h left`,                                    color:'var(--yellow)', bg:'var(--yellow-bg)', urgency:1 };
  const d = Math.floor(remH / 24), h = Math.round(remH % 24);
  return { label: d > 0 ? `${d}d ${h}h left` : `${Math.round(remH)}h left`,                      color:'var(--green)',  bg:'var(--green-bg)',  urgency:0 };
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString([], { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function fmtHours(h) {
  if (h < 1)  return `${Math.round(h * 60)} min`;
  if (h < 24) return `${h}h`;
  const d = h / 24;
  return d === Math.floor(d) ? `${d} day${d > 1 ? 's' : ''}` : `${d.toFixed(1)} days`;
}

// ============================================================

// ============================================================
function render() {
  renderBadges();
  if (currentTab === 'dashboard') renderDashboard();
  else                             renderCatalog();

function renderBadges() {
  let expired = 0, warn = 0;
  Object.values(logs).forEach(l => {
    const st = getStatus(l.loggedAt, l.hours);
    if (st.urgency === 3) expired++;
    else if (st.urgency >= 1) warn++;
  });
  const eb = document.getElementById('badge-expired');
  const wb = document.getElementById('badge-warn');
  eb.style.display = expired > 0 ? '' : 'none';
  eb.textContent   = expired + ' EXPIRED';
  wb.style.display = warn > 0 ? '' : 'none';
  wb.textContent   = warn + ' SOON';
}

function renderDashboard() {
  // --- Category filter buttons ---
  const cats = ['All', ...Object.keys(CATALOG)];
  document.getElementById('cat-filters').innerHTML = cats.map(c => {
    const isActive = filterCat === c;
    const style    = isActive && c !== 'All' ? `background:${CAT_COLORS[c]};border-color:${CAT_COLORS[c]};` : '';
    return `<button class="cat-btn${isActive ? ' active' : ''}" style="${style}" onclick="setCatFilter('${c}')">${CAT_ICONS[c] || ''} ${c}</button>`;
  }).join('');

  // --- Filter & sort log entries ---
  let list = Object.values(logs).filter(l => {
    // Drop items that expired more than 1 hour ago (already discarded)
    return l.loggedAt + l.hours * 3600000 > Date.now() - 3600000;
  });
  if (filterCat !== 'All') list = list.filter(l => l.cat === filterCat);
  if (searchQ)             list = list.filter(l => l.name.toLowerCase().includes(searchQ));

  list.sort((a, b) => {
    const sa = getStatus(a.loggedAt, a.hours);
    const sb = getStatus(b.loggedAt, b.hours);
    if (sb.urgency !== sa.urgency) return sb.urgency - sa.urgency;
    return (a.loggedAt + a.hours * 3600000) - (b.loggedAt + b.hours * 3600000);
  });

  // --- Render ---
  const el = document.getElementById('log-list');

  if (list.length === 0) {
    const hasAny = Object.keys(logs).length > 0;
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${hasAny ? '🔍' : '📭'}</div>
        <div class="empty-text">${hasAny ? 'No items match your filter.' : 'Nothing logged yet.<br>Tap <b>Log Item</b> to start tracking!'}</div>
        ${!hasAny ? '<button class="empty-btn" onclick="switchTab(\'add\')">+ Log First Item</button>' : ''}
      </div>`;
    return;
  }

  // Build rows using DOM methods to avoid HTML attribute quoting issues
  const card = document.createElement('div');
  card.className = 'card';

  list.forEach(l => {
    const st   = getStatus(l.loggedAt, l.hours);
    const expT = l.loggedAt + l.hours * 3600000;

    const row = document.createElement('div');
    row.className = 'log-row';
    row.style.borderLeft = `3px solid ${st.color}`;
    row.innerHTML = `
      <div class="row-icon">${CAT_ICONS[l.cat] || '📦'}</div>
      <div class="row-info">
        <div class="row-name">${l.name}</div>
        <div class="row-sub">${l.state} · ${fmtTime(l.loggedAt)}</div>
      </div>
      <div class="row-status">
        <div class="status-chip${st.urgency === 3 ? ' pulse' : ''}" style="background:${st.bg};color:${st.color}">${st.label}</div>
        <div class="row-exp">exp ${fmtTime(expT)}</div>
      </div>`;

    // Delete button — uses addEventListener to avoid quoting issues
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      if (confirm('Mark as discarded and remove?')) deleteLog(l.id);
    });
    row.appendChild(delBtn);
    card.appendChild(row);
  });

  el.innerHTML = '';
  el.appendChild(card);
}

function renderCatalog() {
  const el     = document.getElementById('catalog-list');
  const groups = Object.entries(CATALOG).map(([cat, items]) => ({
    cat,
    items: items.filter(i => !searchQ || i.n.toLowerCase().includes(searchQ))
  })).filter(g => g.items.length > 0);

  if (groups.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No items match your search.</div></div>`;
    return;
  }

  el.innerHTML = '';

  groups.forEach(({ cat, items }) => {
    const group = document.createElement('div');
    group.className = 'cat-group';
    group.innerHTML = `
      <div class="cat-header">
        <span style="font-size:18px">${CAT_ICONS[cat]}</span>
        <span class="cat-title" style="color:${CAT_COLORS[cat]}">${cat}</span>
      </div>`;

    const card = document.createElement('div');
    card.className = 'card';

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'add-row';
      row.innerHTML = `
        <div class="add-row-name">${item.n}</div>
        <div class="add-row-states">${item.s.map(s => s.l).join(' / ')}</div>
        <div class="add-arrow">›</div>`;

      // Use addEventListener — completely avoids JSON/quote issues in HTML attributes
      row.addEventListener('click', () => openModal(cat, item));
      card.appendChild(row);
    });

    group.appendChild(card);
    el.appendChild(group);
  });
}

// ============================================================
// MODAL  — also uses addEventListener for state buttons
// ============================================================
function openModal(cat, item) {
  pendingCat  = cat;
  pendingItem = item;

  document.getElementById('modal-icon').textContent  = CAT_ICONS[cat] || '📦';
  document.getElementById('modal-title').textContent = item.n;
  document.getElementById('modal-title').style.color = CAT_COLORS[cat] || 'var(--green)';

  const statesEl = document.getElementById('modal-states');
  statesEl.innerHTML = '';

  item.s.forEach(state => {
    const btn = document.createElement('button');
    btn.className = 'state-btn';
    btn.innerHTML = `
      <span>${state.l}</span>
      <span class="state-btn-hours" style="color:${CAT_COLORS[cat] || 'var(--green)'}">${fmtHours(state.h)} shelf life</span>`;

    // addEventListener — no HTML attribute quoting, guaranteed to work
    btn.addEventListener('click', () => addLog(cat, item, state));
    statesEl.appendChild(btn);
  });

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// Close modal when tapping the dark background (not the modal itself)
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// UI CONTROLS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');
  document.getElementById('tab-add').classList.toggle('active', tab === 'add');
  document.getElementById('view-dashboard').style.display = tab === 'dashboard' ? '' : 'none';
  document.getElementById('view-add').style.display       = tab === 'add'       ? '' : 'none';
  render();
}

function onSearch() {
  searchQ = document.getElementById('search-input').value.toLowerCase().trim();
  render();
}

function setCatFilter(cat) {
  filterCat = cat;
  render();
}

// ============================================================
// CLOCK — update countdown timers every minute
// ============================================================
setInterval(() => {
  if (currentTab === 'dashboard') renderDashboard();
  renderBadges();
}, 60000);

// ============================================================
// BOOT
// ============================================================
initFirebase();
</script>
</body>
</html>
