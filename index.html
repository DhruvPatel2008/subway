  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* HEADER */

  #logo span { font-size: 11px; display: block; letter-spacing: 2px; color: var(--muted); font-family: 'DM Mono', monospace; font-weight: 300; }
  #badges { display: flex; gap: 6px; align-items: center; }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-red { background: var(--red-bg); color: var(--red); animation: pulse 2s infinite; }
  .badge-orange { background: var(--orange-bg); color: var(--orange); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* SYNC STATUS */
  #sync-bar { max-width: 680px; margin: 10px auto 0; display: flex; align-items: center; gap: 6px; padding: 0 18px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .sync-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .sync-dot.error { background: var(--red); }
  #sync-text { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  /* MAIN */
  #main { max-width: 680px; margin: 0 auto; padding: 16px 16px 100px; }

  /* TABS */
  #tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab-btn { padding: 8px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .tab-btn.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 500; }
  .tab-btn:hover:not(.active) { border-color: #333; color: var(--text); }

  /* SEARCH + FILTER */
  #search-bar { position: relative; margin-bottom: 12px; }
  #search-bar input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px 10px 36px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border 0.15s; }
  #search-bar input:focus { border-color: #333; }
  #search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  #cat-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .cat-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.12s; white-space: nowrap; }
  .cat-btn:hover { color: var(--text); }
  .cat-btn.active { color: #fff; border-color: transparent; }

  /* CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

  /* LOG ROWS */
  .log-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); transition: background 0.1s; animation: rowIn 0.2s ease; }
  .log-row:last-child { border-bottom: none; }
  .log-row:hover { background: var(--surface2); }
  @keyframes rowIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .row-icon { font-size: 18px; flex-shrink: 0; }
  .row-info { flex: 1; min-width: 0; }
  .row-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .row-status { text-align: right; flex-shrink: 0; }
  .status-chip { padding: 4px 9px; border-radius: 7px; font-size: 11px; font-weight: 500; white-space: nowrap; display: inline-block; }
  .row-exp { font-size: 9px; color: var(--muted); margin-top: 3px; }
  .del-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 28px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }

  .empty-text { font-size: 13px; line-height: 1.8; }

  .cat-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; }

  .add-row-states { font-size: 10px; color: var(--muted); }

  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
  #modal-overlay.open { display: flex; }
  #modal { background: #111; border: 1px solid #222; border-radius: 20px 20px 0 0; width: 100%; max-width: 680px; max-height: 80vh; overflow-y: auto; padding: 24px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  #modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 4px; }

  .state-btn:hover { background: var(--surface2); border-color: #333; transform: translateY(-1px); }

  #modal-cancel:hover { color: var(--text); border-color: #333; }

  #firebase-banner { display: none; background: #1a0500; border: 1px solid #6b2500; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; font-size: 12px; color: #ff8c42; line-height: 1.7; }

</style>

// ============================================================
// STATE
// ============================================================
let logs = {}; // { id: {id,name,state,hours,cat,loggedAt} }
let db = null;
let currentTab = 'dashboard';
let searchQ = '';
let filterCat = 'All';
let clockInterval = null;

// ============================================================
// FIREBASE INIT
// ============================================================
function initFirebase() {
  const isPlaceholder = FIREBASE_CONFIG.apiKey.includes("PASTE_YOUR");
  if (isPlaceholder) {
    document.getElementById('firebase-banner').classList.add('show');
    setSyncStatus('error', 'NOT CONFIGURED');
    // Fall back to localStorage only
    loadFromLocalStorage();
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    const logsRef = db.ref('logs');
    logsRef.on('value', snap => {
      logs = snap.val() || {};
      render();
    }, err => {
      console.error(err);
      setSyncStatus('error', 'SYNC ERROR');
    });
    db.ref('.info/connected').on('value', snap => {
      if (snap.val()) setSyncStatus('connected', 'SYNCED — LIVE');
      else setSyncStatus('', 'RECONNECTING...');
    });
  } catch(e) {
    document.getElementById('firebase-banner').classList.add('show');
    setSyncStatus('error', 'CONFIG ERROR');
    loadFromLocalStorage();
  }
}

function loadFromLocalStorage() {
  try { logs = JSON.parse(localStorage.getItem('sw_logs') || '{}'); } catch { logs = {}; }
  render();
}
function saveToLocalStorage() {
  try { localStorage.setItem('sw_logs', JSON.stringify(logs)); } catch {}
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sync-text').textContent = text;
}

// ============================================================
// ACTIONS
// ============================================================
function addLog(cat, item, state) {
  const id = 'log_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  const entry = { id, cat, name: item.n, state: state.l, hours: state.h, loggedAt: Date.now() };
  if (db) {
    db.ref('logs/' + id).set(entry);
  } else {
    logs[id] = entry;
    saveToLocalStorage();
    render();
  }
  closeModal();
  switchTab('dashboard');
}

function deleteLog(id) {
  if (db) {
    db.ref('logs/' + id).remove();
  } else {
    delete logs[id];
    saveToLocalStorage();
    render();
  }
}

// ============================================================
// STATUS
// ============================================================
function getStatus(loggedAt, hours) {
  const now = Date.now();
  const expiresAt = loggedAt + hours * 3600000;
  const rem = expiresAt - now;
  const remH = rem / 3600000;
  if (rem <= 0) return { label:'⚠ DISCARD NOW', color:'var(--red)', bg:'var(--red-bg)', urgency:3 };
  if (remH <= 2) return { label: remH < 1 ? `${Math.ceil(remH*60)}m left` : `${remH.toFixed(1)}h left`, color:'var(--orange)', bg:'var(--orange-bg)', urgency:2 };
  if (remH <= 6) return { label: `${remH.toFixed(1)}h left`, color:'var(--yellow)', bg:'var(--yellow-bg)', urgency:1 };
  const d = Math.floor(remH / 24), h = Math.round(remH % 24);
  return { label: d > 0 ? `${d}d ${h}h left` : `${Math.round(remH)}h left`, color:'var(--green)', bg:'var(--green-bg)', urgency:0 };
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtHours(h) {
  if (h < 1) return `${Math.round(h*60)}min`;
  if (h < 24) return `${h}h`;
  const d = h/24;
  return d === Math.floor(d) ? `${d} day${d>1?'s':''}` : `${d.toFixed(1)} days`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  renderBadges();
  if (currentTab === 'dashboard') renderDashboard();
  else renderCatalog();
}

function renderBadges() {
  let expired = 0, warn = 0;
  Object.values(logs).forEach(l => {
    const st = getStatus(l.loggedAt, l.hours);
    if (st.urgency === 3) expired++;
    else if (st.urgency >= 1) warn++;
  });
  const eb = document.getElementById('badge-expired');
  const wb = document.getElementById('badge-warn');
  eb.style.display = expired > 0 ? '' : 'none';
  eb.textContent = expired + ' EXPIRED';
  wb.style.display = warn > 0 ? '' : 'none';
  wb.textContent = warn + ' SOON';
}

function renderDashboard() {
  // Build cat filters
  const cats = ['All', ...Object.keys(CATALOG)];
  const catFiltersEl = document.getElementById('cat-filters');
  catFiltersEl.innerHTML = cats.map(c => `
    <button class="cat-btn${filterCat===c?' active':''}"
      style="${filterCat===c && c!=='All' ? `background:${CAT_COLORS[c]};border-color:${CAT_COLORS[c]};` : ''}"
      onclick="setCatFilter('${c}')">
      ${CAT_ICONS[c]||''} ${c}
    </button>
  `).join('');

  let list = Object.values(logs);
  // remove fully expired entries older than 1hr past expiry
  list = list.filter(l => l.loggedAt + l.hours*3600000 > Date.now() - 3600000);
  // filter
  if (filterCat !== 'All') list = list.filter(l => l.cat === filterCat);
  if (searchQ) list = list.filter(l => l.name.toLowerCase().includes(searchQ));
  // sort urgency first, then by expiry
  list.sort((a,b) => {
    const sa = getStatus(a.loggedAt, a.hours), sb = getStatus(b.loggedAt, b.hours);
    if (sb.urgency !== sa.urgency) return sb.urgency - sa.urgency;
    return (a.loggedAt+a.hours*3600000) - (b.loggedAt+b.hours*3600000);
  });

  const el = document.getElementById('log-list');
  if (list.length === 0) {
    const hasLogs = Object.keys(logs).length > 0;
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">${hasLogs ? '🔍' : '📭'}</div>
      <div class="empty-text">${hasLogs ? 'No items match your filter.' : 'Nothing logged yet.<br/>Tap <b>Log Item</b> to start tracking!'}</div>
      ${!hasLogs ? `<button class="empty-btn" onclick="switchTab('add')">+ Log First Item</button>` : ''}
    </div>`;
    return;
  }

  el.innerHTML = `<div class="card">${list.map(l => {
    const st = getStatus(l.loggedAt, l.hours);
    const expT = l.loggedAt + l.hours * 3600000;
    return `<div class="log-row" style="border-left:3px solid ${st.color}">
      <div class="row-icon">${CAT_ICONS[l.cat]||'📦'}</div>
      <div class="row-info">
        <div class="row-name">${l.name}</div>
        <div class="row-sub">${l.state} · ${fmtTime(l.loggedAt)}</div>
      </div>
      <div class="row-status">
        <div class="status-chip ${st.urgency===3?'pulse':''}" style="background:${st.bg};color:${st.color}">${st.label}</div>
        <div class="row-exp">exp ${fmtTime(expT)}</div>
      </div>
      <button class="del-btn" onclick="confirmDelete('${l.id}')">✕</button>
    </div>`;
  }).join('')}</div>`;
}

function renderCatalog() {
  const el = document.getElementById('catalog-list');
  const groups = Object.entries(CATALOG).map(([cat, items]) => ({
    cat,
    items: items.filter(i => !searchQ || i.n.toLowerCase().includes(searchQ))
  })).filter(g => g.items.length > 0);

  if (groups.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No items match your search.</div></div>`;
    return;
  }

  el.innerHTML = groups.map(({cat, items}) => `
    <div class="cat-group">
      <div class="cat-header">
        <span style="font-size:18px">${CAT_ICONS[cat]}</span>
        <span class="cat-title" style="color:${CAT_COLORS[cat]}">${cat}</span>
      </div>
      <div class="card">
        ${items.map(item => `
          <div class="add-row" onclick='openModal(${JSON.stringify(cat)}, ${JSON.stringify(item)})'>
            <div class="add-row-name">${item.n}</div>
            <div class="add-row-states">${item.s.map(s=>s.l).join(' / ')}</div>
            <div class="add-arrow">›</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ============================================================
// UI CONTROLS
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-dashboard').classList.toggle('active', tab==='dashboard');
  document.getElementById('tab-add').classList.toggle('active', tab==='add');
  document.getElementById('view-dashboard').style.display = tab==='dashboard' ? '' : 'none';
  document.getElementById('view-add').style.display = tab==='add' ? '' : 'none';
  render();
}

function onSearch() {
  searchQ = document.getElementById('search-input').value.toLowerCase().trim();
  render();
}

function setCatFilter(cat) {
  filterCat = cat;
  render();
}

// ============================================================
// MODAL
// ============================================================
let pendingCat = null, pendingItem = null;
function openModal(cat, item) {
  pendingCat = cat; pendingItem = item;
  document.getElementById('modal-icon').textContent = CAT_ICONS[cat] || '📦';
  document.getElementById('modal-title').textContent = item.n;
  document.getElementById('modal-title').style.color = CAT_COLORS[cat];
  document.getElementById('modal-states').innerHTML = item.s.map(s => `
    <button class="state-btn" onclick="addLog('${cat}', pendingItem, ${JSON.stringify(s)})">
      <span>${s.l}</span>
      <span class="state-hours" style="color:${CAT_COLORS[cat]}">${fmtHours(s.h)} shelf life</span>
    </button>
  `).join('');
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function confirmDelete(id) {
  if (confirm('Mark this item as discarded and remove it?')) deleteLog(id);
}

// ============================================================
// CLOCK — re-render every minute to update timers
// ============================================================
clockInterval = setInterval(() => { if(currentTab==='dashboard') renderDashboard(); }, 60000);

// ============================================================
// BOOT
// ============================================================
initFirebase();
</script>
</body>
</html>
